# General settings
site_name: "Sampath Kumar | AI & Cloud Blog"
site_description: Personal blog of Sampath Kumar M
site_author: M Sampath Kumar

# exclude_docs: |
#   blog/posts/images/

# Repository
# repo_name: Github
# repo_url: https://github.com/msampathkumar/msampathkumar.github.io/

# Copyright
copyright: Copyright 2024 © M Sampath Kumar
theme:
  name: material
  favicon: assets/images/favicon.svg
  icon:
    logo: material/book-open-page-variant
    previous: fontawesome/solid/angle-left
    next: fontawesome/solid/angle-right
  font:
    text: Inter
    code: Fira Code
  extra_css:
    - stylesheets/extra.css
  palette:
    # Palette toggle for light mode — white + pastel pink accent
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: white
      accent: pink
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode

    # Palette toggle for dark mode — soft black + light blue accent
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: black
      accent: light blue
      toggle:
        icon: material/brightness-4
        name: Switch to system preference
  features:
    - navigation.indexes # for blog/index.md
    - navigation.tabs
    - navigation.top
    - navigation.instant
    - navigation.expand
    - navigation.path
    - navigation.tracking
    # toc.integrate is intentionally OFF so the table of contents renders as a
    # right-hand sidebar (right nav) instead of being folded into the left nav.
    - toc.follow
    - content.code.copy
    - search.suggest
    - search.highlight
markdown_extensions:
  - attr_list
  # emojis
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

plugins:
  - meta
  # NOTE: the Material 'blog' plugin is intentionally NOT enabled: it takes
  # ownership of blog/posts/ and excludes those files from the manual nav,
  # which would break the curated "Writing" tab. Latest-posts on the Home page
  # are generated by hooks/latest_posts.py instead; new posts are added via
  # `make new-post` (see Makefile), which also wires them into the nav.
  - search
  - mermaid2
  - git-revision-date-localized:
      type: timeago

# Build hooks
hooks:
  - hooks/latest_posts.py

# Additional configuration
extra:
  status:
    new: Recently added
    deprecated: Deprecated
  analytics:
    # https://analytics.google.com/analytics/web/
    provider: google
    property: !ENV GOOGLE_ANALYTICS_KEY_GITHUB_IO_BLOG
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/msampathkumar
    - icon: fontawesome/brands/docker
      link: https://hub.docker.com/u/msampathkumar
    - icon: fontawesome/brands/python
      link: https://pypi.org/user/sampath/
    - icon: fontawesome/brands/bluesky
      link: https://bsky.app/profile/sampathm.bsky.social
    - icon: fontawesome/brands/linkedin
      link: https://www.linkedin.com/in/msampathkumar/


